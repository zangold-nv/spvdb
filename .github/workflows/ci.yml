name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --------------------------------------------------------------------------
  # Linux build + test
  # --------------------------------------------------------------------------
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build spirv-tools

      - name: Download slangc
        run: |
          SLANG_TAG="v2025.6.3"
          curl -fsSL \
            "https://github.com/shader-slang/slang/releases/download/${SLANG_TAG}/slang-${SLANG_TAG#v}-linux-x86_64.tar.gz" \
            -o slang.tar.gz
          mkdir -p slang-install
          tar -xzf slang.tar.gz -C slang-install
          # slangc is in bin/ inside the archive
          echo "$PWD/slang-install/bin" >> "$GITHUB_PATH"
          echo "SLANG_DIR=$PWD/slang-install" >> "$GITHUB_ENV"

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # --------------------------------------------------------------------------
  # Windows build + test
  # --------------------------------------------------------------------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install CMake and Ninja
        uses: lukka/get-cmake@latest

      - name: Install Vulkan SDK (includes spirv-as)
        uses: humbletim/setup-vulkan-sdk@v1.2.0
        with:
          vulkan-query-version: 1.3.268.0
          vulkan-use-cache: true

      - name: Download slangc
        shell: pwsh
        run: |
          $tag = "v2025.6.3"
          $ver = $tag.TrimStart("v")
          $url = "https://github.com/shader-slang/slang/releases/download/$tag/slang-$ver-windows-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile slang.zip
          Expand-Archive slang.zip -DestinationPath slang-install
          $binDir = (Get-ChildItem -Recurse -Filter "slangc.exe" slang-install).DirectoryName
          echo $binDir >> $env:GITHUB_PATH

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure
