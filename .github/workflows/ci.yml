name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # --------------------------------------------------------------------------
  # Linux build + test
  # --------------------------------------------------------------------------
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake ninja-build spirv-tools

      - name: Download slangc
        run: |
          SLANG_TAG="v2026.4.1"
          curl -fsSL \
            "https://github.com/shader-slang/slang/releases/download/${SLANG_TAG}/slang-${SLANG_TAG#v}-linux-x86_64.tar.gz" \
            -o slang.tar.gz
          mkdir -p slang-install
          tar -xzf slang.tar.gz -C slang-install
          # slangc is in bin/ inside the archive root or a versioned subdirectory
          BIN_DIR=$(find slang-install -name slangc -type f 2>/dev/null | head -1 | xargs dirname || echo "")
          if [ -z "$BIN_DIR" ]; then
            echo "ERROR: slangc not found in archive" && exit 1
          fi
          echo "$BIN_DIR" >> "$GITHUB_PATH"
          echo "SLANG_DIR=$(dirname $BIN_DIR)" >> "$GITHUB_ENV"

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Test
        run: ctest --test-dir build --output-on-failure

  # --------------------------------------------------------------------------
  # Windows build + test
  # --------------------------------------------------------------------------
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK (includes spirv-as)
        shell: pwsh
        run: |
          winget install KhronosGroup.VulkanSDK --silent --accept-package-agreements --accept-source-agreements
          # The SDK installs to C:\VulkanSDK\<version>\ ; search for spirv-as.exe
          $hit = Get-ChildItem -Path "C:\VulkanSDK" -Filter "spirv-as.exe" -Recurse -ErrorAction SilentlyContinue |
                 Select-Object -First 1
          if ($hit) {
            Write-Host "Found spirv-as at: $($hit.FullName)"
            echo $hit.DirectoryName >> $env:GITHUB_PATH
          } else {
            Write-Error "spirv-as.exe not found after Vulkan SDK install"
            exit 1
          }

      - name: Download slangc
        shell: pwsh
        run: |
          $tag = "v2026.4.1"
          $ver = $tag.TrimStart("v")
          $url = "https://github.com/shader-slang/slang/releases/download/$tag/slang-$ver-windows-x86_64.zip"
          Invoke-WebRequest -Uri $url -OutFile slang.zip
          Expand-Archive slang.zip -DestinationPath slang-install
          $binDir = (Get-ChildItem -Recurse -Filter "slangc.exe" slang-install).DirectoryName
          echo $binDir >> $env:GITHUB_PATH

      - name: Configure
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Debug

      - name: Build
        run: cmake --build build

      - name: Test
        shell: pwsh
        run: ctest --test-dir build --output-on-failure -V 2>&1 | Tee-Object test-output.txt; exit $LASTEXITCODE

      - name: Upload test output on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: windows-test-output
          path: test-output.txt
